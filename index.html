<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Sky Cardboard VR v0.3.1</title>
  <style>
    :root {
      --eye-gap: 8px;
      --panel: rgba(18,18,18,.92);
      --line: rgba(255,255,255,.22);
      --text: #f5f5f5;
      --muted: rgba(255,255,255,.68);
      --focus: rgba(255,255,255,.96);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      user-select: none;
      overscroll-behavior: none;
    }

    #app { position: fixed; inset: 0; background: #000; }

    #vr {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: var(--eye-gap);
      background: #000;
    }

    .eye {
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .viewer {
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: #000;
    }

    .mask {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.12) 74%, rgba(0,0,0,.56) 100%);
    }

    .crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: .36;
    }

    .crosshair:before,
    .crosshair:after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.56);
      border-radius: 2px;
    }

    .crosshair:before { left: 11px; top: 0; width: 2px; height: 24px; }
    .crosshair:after { left: 0; top: 11px; width: 24px; height: 2px; }

    /*
      Conservative Aladin UI hiding.
      No MutationObserver and no repeated DOM rewriting in v0.3.1.
      The canvas/tile layers are not touched.
    */
    .viewer .aladin-location,
    .viewer .aladin-fov,
    .viewer .aladin-frameChoice,
    .viewer .aladin-frame-choice,
    .viewer .aladin-cooFrame,
    .viewer .aladin-coordinates,
    .viewer .aladin-coordinate,
    .viewer .aladin-layerBox,
    .viewer .aladin-layer-box,
    .viewer .aladin-layersControl,
    .viewer .aladin-layers-control,
    .viewer .aladin-stack-control,
    .viewer .aladin-toolbar,
    .viewer .aladin-statusBar,
    .viewer .aladin-status-bar,
    .viewer .aladin-logo,
    .viewer .aladin-share,
    .viewer .aladin-fullscreen,
    .viewer .aladin-projection,
    .viewer .aladin-grid,
    .viewer .aladin-reticleColor,
    .viewer .aladin-context-menu,
    .viewer .aladin-popup,
    .viewer .aladin-tooltip,
    .viewer .aladin-measurement-table,
    .viewer .aladin-control,
    .viewer .aladin-controls {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    #microHud {
      position: absolute;
      z-index: 18;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      display: none;
      max-width: calc(100vw - 20px);
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(7px);
      color: rgba(255,255,255,.86);
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
    }

    #microHud.visible { display: block; }

    #loading {
      position: absolute;
      z-index: 19;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(0,0,0,.62);
      color: rgba(255,255,255,.82);
      font-size: 14px;
      pointer-events: none;
    }

    #loading.hide { display: none; }

    #menu {
      position: absolute;
      z-index: 40;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.22);
    }

    #menu.open { display: flex; }

    #panel {
      width: min(900px, calc(100vw - 28px));
      max-height: min(760px, calc(100vh - 28px));
      box-sizing: border-box;
      overflow: hidden;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.28);
      background: var(--panel);
      box-shadow: 0 16px 48px rgba(0,0,0,.66);
    }

    #panel h1 {
      margin: 0 0 8px 0;
      font-size: clamp(22px, 4vw, 36px);
      line-height: 1;
      font-weight: 760;
    }

    #panel .sub {
      color: var(--muted);
      font-size: clamp(13px, 2vw, 16px);
      margin-bottom: 14px;
    }

    #menuRows { display: grid; gap: 8px; }

    .menu-row {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(140px, .95fr) auto;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.055);
      font-size: clamp(15px, 2.1vw, 22px);
    }

    .menu-row.focus {
      color: #000;
      background: var(--focus);
      border-color: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.16);
    }

    .menu-row .name { font-weight: 720; }
    .menu-row .value { text-align: right; font-variant-numeric: tabular-nums; }
    .menu-row .hint { opacity: .65; font-size: .72em; white-space: nowrap; }

    #menuHelp {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: clamp(12px, 1.8vw, 16px);
      flex-wrap: wrap;
    }

    #toast {
      position: absolute;
      z-index: 50;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      max-width: calc(100vw - 20px);
      padding: 9px 12px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 13px;
      background: rgba(0,0,0,.72);
      color: rgba(255,255,255,.9);
      font-size: 13px;
      opacity: 0;
      transition: opacity .18s linear;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; }

    @media (max-width: 900px) {
      .menu-row { grid-template-columns: minmax(120px, 1fr) minmax(105px, .8fr); }
      .menu-row .hint { display: none; }
      #microHud { font-size: 10px; top: 7px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="vr">
    <div class="eye">
      <div id="left" class="viewer"></div>
      <div class="crosshair"></div>
      <div class="mask"></div>
    </div>
    <div class="eye">
      <div id="right" class="viewer"></div>
      <div class="crosshair"></div>
      <div class="mask"></div>
    </div>
  </div>

  <div id="loading">Loading sky…</div>
  <div id="microHud"></div>

  <div id="menu" aria-hidden="true">
    <div id="panel">
      <h1>Sky Cardboard VR v0.3.1</h1>
      <div class="sub">Стабільна версія без мобільних екранних кнопок. Обидва ока показують одну й ту саму карту; Eye gap змінює тільки проміжок між половинами.</div>
      <div id="menuRows"></div>
      <div id="menuHelp">
        <span>↑↓ / D-pad — пункт</span>
        <span>←→ / лівий стик — змінити</span>
        <span>A — вибрати</span>
        <span>B — закрити</span>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script src="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.js" charset="utf-8"></script>
<script>
(() => {
  const surveys = [
    { id: 'P/DSS2/color', name: 'DSS2 color' },
    { id: 'P/allWISE/color', name: 'AllWISE color' },
    { id: 'P/2MASS/color', name: '2MASS color' },
    { id: 'PanSTARRS/DR1/color-i-r-g', name: 'PanSTARRS DR1' }
  ];

  const targets = [
    { name: 'M31 Andromeda', ra: 10.6847083, dec: 41.26875, fov: 6 },
    { name: 'M42 Orion', ra: 83.82208, dec: -5.39111, fov: 3 },
    { name: 'Galactic Center', ra: 266.41683, dec: -29.00781, fov: 12 },
    { name: 'M45 Pleiades', ra: 56.75, dec: 24.1167, fov: 5 },
    { name: 'Vela SNR', ra: 128.75, dec: -45.6, fov: 8 },
    { name: 'North Celestial Pole', ra: 37.95, dec: 89.2641, fov: 10 }
  ];

  const state = {
    ra: targets[0].ra,
    dec: targets[0].dec,
    fov: targets[0].fov,
    speed: 0.55,
    eyeGap: 8,
    surveyIndex: 0,
    targetIndex: 0,
    grid: false,
    hudVisible: false,
    menuOpen: false,
    menuIndex: 0,
    ready: false,
    lastSend: 0,
    keys: new Set(),
    padName: '',
    lastNav: 0,
    lastEdit: 0,
    toastTimer: null
  };

  const $ = (id) => document.getElementById(id);
  const menuEl = $('menu');
  const menuRowsEl = $('menuRows');
  const microHudEl = $('microHud');
  const toastEl = $('toast');

  let leftAladin = null;
  let rightAladin = null;
  let lastButtonState = {};

  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  const wrapRa = (ra) => ((ra % 360) + 360) % 360;

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem('sky_cardboard_v031') || '{}');
      Object.assign(state, saved);
    } catch (_) {}

    state.ra = wrapRa(Number(state.ra) || targets[0].ra);
    state.dec = clamp(Number(state.dec) || targets[0].dec, -89.9, 89.9);
    state.fov = clamp(Number(state.fov) || targets[0].fov, 0.01, 180);
    state.speed = clamp(Number(state.speed) || 0.55, 0.05, 5);
    state.eyeGap = clamp(Number(state.eyeGap) || 8, 0, 160);
    state.surveyIndex = clamp(Number(state.surveyIndex) || 0, 0, surveys.length - 1);
    state.targetIndex = clamp(Number(state.targetIndex) || 0, 0, targets.length - 1);
    state.grid = !!state.grid;
    state.hudVisible = !!state.hudVisible;
  }

  function saveState() {
    localStorage.setItem('sky_cardboard_v031', JSON.stringify({
      ra: state.ra,
      dec: state.dec,
      fov: state.fov,
      speed: state.speed,
      eyeGap: state.eyeGap,
      surveyIndex: state.surveyIndex,
      targetIndex: state.targetIndex,
      grid: state.grid,
      hudVisible: state.hudVisible
    }));
  }

  function setEyeGap(px) {
    state.eyeGap = clamp(Number(px) || 0, 0, 160);
    document.documentElement.style.setProperty('--eye-gap', state.eyeGap + 'px');
    updateHud();
    renderMenu();
    saveState();
  }

  function toast(msg) {
    if (state.menuOpen) return;
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(() => toastEl.classList.remove('show'), 700);
  }

  function updateHud() {
    microHudEl.textContent =
      `RA ${state.ra.toFixed(3)} · Dec ${state.dec.toFixed(3)} · FoV ${state.fov.toFixed(2)}° · Gap ${state.eyeGap.toFixed(0)} px · ${surveys[state.surveyIndex].name}` +
      (state.padName ? ` · 🎮 ${state.padName.slice(0, 22)}` : '');
    microHudEl.classList.toggle('visible', !!state.hudVisible);
  }

  function oneTimeHideKnownChrome() {
    const selectors = [
      '.aladin-location', '.aladin-fov', '.aladin-frameChoice', '.aladin-frame-choice',
      '.aladin-cooFrame', '.aladin-coordinates', '.aladin-coordinate',
      '.aladin-layerBox', '.aladin-layer-box', '.aladin-layersControl', '.aladin-layers-control',
      '.aladin-toolbar', '.aladin-statusBar', '.aladin-status-bar',
      '.aladin-logo', '.aladin-share', '.aladin-fullscreen', '.aladin-projection',
      '.aladin-context-menu', '.aladin-popup', '.aladin-tooltip'
    ].join(',');

    for (const root of [$('left'), $('right')]) {
      root.querySelectorAll(selectors).forEach(el => {
        el.style.display = 'none';
        el.style.visibility = 'hidden';
        el.style.pointerEvents = 'none';
      });
    }
  }

  function syncView(force = false) {
    if (!state.ready || !leftAladin || !rightAladin) {
      updateHud();
      return;
    }

    const now = performance.now();
    if (!force && now - state.lastSend < 70) return;
    state.lastSend = now;

    for (const al of [leftAladin, rightAladin]) {
      try {
        al.gotoRaDec(state.ra, state.dec);
        al.setFoV(state.fov);
      } catch (e) {
        console.warn(e);
      }
    }

    updateHud();
    saveState();
  }

  function setSurvey(index) {
    state.surveyIndex = (index + surveys.length) % surveys.length;
    const survey = surveys[state.surveyIndex];

    for (const al of [leftAladin, rightAladin]) {
      if (!al) continue;
      try { al.setImageLayer(survey.id); } catch (e) { console.warn(e); }
    }

    toast('Шар: ' + survey.name);
    updateHud();
    renderMenu();
    saveState();
  }

  function goTarget(index) {
    state.targetIndex = (index + targets.length) % targets.length;
    const t = targets[state.targetIndex];

    state.ra = wrapRa(t.ra);
    state.dec = clamp(t.dec, -89.9, 89.9);
    state.fov = clamp(t.fov, 0.01, 180);

    syncView(true);
    renderMenu();
  }

  function toggleGrid() {
    state.grid = !state.grid;

    for (const al of [leftAladin, rightAladin]) {
      if (!al) continue;
      try { al.setCooGrid(state.grid); } catch (e) { console.warn(e); }
    }

    toast(state.grid ? 'Сітка: on' : 'Сітка: off');
    renderMenu();
    saveState();
  }

  function toggleHud() {
    state.hudVisible = !state.hudVisible;
    updateHud();
    renderMenu();
    saveState();
  }

  async function fullscreen() {
    try {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    } catch (e) {
      console.warn(e);
    }
    renderMenu();
  }

  function openMenu() {
    state.menuOpen = true;
    toastEl.classList.remove('show');
    menuEl.classList.add('open');
    menuEl.setAttribute('aria-hidden', 'false');
    renderMenu();
  }

  function closeMenu() {
    state.menuOpen = false;
    menuEl.classList.remove('open');
    menuEl.setAttribute('aria-hidden', 'true');
  }

  const menuSchema = [
    { name: 'Продовжити', value: () => 'закрити меню', hint: 'A', action: () => closeMenu() },
    { name: 'Об’єкт', value: () => targets[state.targetIndex].name, hint: '← →', edit: dir => goTarget(state.targetIndex + dir), action: () => goTarget(state.targetIndex + 1) },
    { name: 'Шар', value: () => surveys[state.surveyIndex].name, hint: '← →', edit: dir => setSurvey(state.surveyIndex + dir), action: () => setSurvey(state.surveyIndex + 1) },
    { name: 'Швидкість', value: () => state.speed.toFixed(2) + '×', hint: '← →', edit: dir => { state.speed = clamp(Math.round((state.speed + dir * 0.05) * 100) / 100, 0.05, 5); updateHud(); renderMenu(); saveState(); } },
    { name: 'FoV', value: () => state.fov.toFixed(2) + '°', hint: '← →', edit: dir => { state.fov = clamp(state.fov * (dir > 0 ? 1.08 : 0.925), 0.01, 180); syncView(true); renderMenu(); } },
    { name: 'Eye gap', value: () => state.eyeGap.toFixed(0) + ' px', hint: '← →', edit: dir => setEyeGap(state.eyeGap + dir * 2) },
    { name: 'Сітка', value: () => state.grid ? 'on' : 'off', hint: 'A', action: () => toggleGrid() },
    { name: 'Micro HUD', value: () => state.hudVisible ? 'on' : 'off', hint: 'A', action: () => toggleHud() },
    { name: 'Fullscreen', value: () => document.fullscreenElement ? 'on' : 'off', hint: 'A', action: () => fullscreen() },
    { name: 'Скинути VR', value: () => 'Gap 8 px, speed 0.55×', hint: 'A', action: () => { state.speed = 0.55; state.hudVisible = false; setEyeGap(8); updateHud(); renderMenu(); saveState(); } }
  ];

  function renderMenu() {
    if (!state.menuOpen) return;

    menuRowsEl.innerHTML = '';
    menuSchema.forEach((row, i) => {
      const div = document.createElement('div');
      div.className = 'menu-row' + (i === state.menuIndex ? ' focus' : '');
      div.innerHTML = `<div class="name">${row.name}</div><div class="value">${row.value()}</div><div class="hint">${row.hint || ''}</div>`;
      menuRowsEl.appendChild(div);
    });
  }

  function menuMove(dir) {
    state.menuIndex = (state.menuIndex + dir + menuSchema.length) % menuSchema.length;
    renderMenu();
  }

  function menuEdit(dir) {
    const row = menuSchema[state.menuIndex];
    if (row.edit) row.edit(dir);
    else if (row.action && dir !== 0) row.action();
  }

  function menuAction() {
    const row = menuSchema[state.menuIndex];
    if (row.action) row.action();
    else if (row.edit) row.edit(1);
    renderMenu();
  }

  function initAladin() {
    A.init.then(() => {
      const opts = {
        survey: surveys[state.surveyIndex].id,
        fov: state.fov,
        target: `${state.ra} ${state.dec}`,
        cooFrame: 'ICRSd',
        projection: 'TAN',
        showReticle: false,
        showCooGrid: state.grid,
        showCooGridControl: false,
        showProjectionControl: false,
        showZoomControl: false,
        showFullscreenControl: false,
        showShareControl: false,
        showSimbadPointerControl: false,
        showContextMenu: false
      };

      leftAladin = A.aladin('#left', opts);
      rightAladin = A.aladin('#right', opts);
      state.ready = true;

      setEyeGap(state.eyeGap);
      setSurvey(state.surveyIndex);

      setTimeout(() => {
        oneTimeHideKnownChrome();
        syncView(true);
        $('loading').classList.add('hide');
      }, 1100);

      // A second one-time pass is safe and avoids endless DOM mutation loops.
      setTimeout(oneTimeHideKnownChrome, 2600);

      requestAnimationFrame(loop);
    }).catch(err => {
      console.error(err);
      $('loading').textContent = 'Aladin Lite не завантажився. Перевір інтернет / блокування CDN.';
    });
  }

  function keyboardVector() {
    let x = 0, y = 0, z = 0;
    if (state.keys.has('arrowleft') || state.keys.has('a')) x -= 1;
    if (state.keys.has('arrowright') || state.keys.has('d')) x += 1;
    if (state.keys.has('arrowup') || state.keys.has('w')) y -= 1;
    if (state.keys.has('arrowdown') || state.keys.has('s')) y += 1;
    if (state.keys.has('+') || state.keys.has('=') || state.keys.has('pageup')) z -= 1;
    if (state.keys.has('-') || state.keys.has('_') || state.keys.has('pagedown')) z += 1;
    return { x, y, z };
  }

  function getPad() {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    return [...pads].find(p => p && p.connected) || null;
  }

  function buttonPressed(pad, idx) { return !!pad?.buttons?.[idx]?.pressed; }
  function buttonValue(pad, idx) { return Number(pad?.buttons?.[idx]?.value || 0); }

  function edgeButton(pad, idx) {
    const key = String(idx);
    const now = buttonPressed(pad, idx);
    const old = !!lastButtonState[key];
    lastButtonState[key] = now;
    return now && !old;
  }

  function axis(pad, idx, dead = 0.14) {
    const v = Number(pad?.axes?.[idx] || 0);
    return Math.abs(v) > dead ? v : 0;
  }

  function gamepadVector(now) {
    const pad = getPad();

    if (!pad) {
      state.padName = '';
      return { x: 0, y: 0, z: 0 };
    }

    state.padName = pad.id || 'gamepad';

    const lx = axis(pad, 0);
    const ly = axis(pad, 1);
    const ry = axis(pad, 3);

    const dLeft = buttonPressed(pad, 14) ? -1 : 0;
    const dRight = buttonPressed(pad, 15) ? 1 : 0;
    const dUp = buttonPressed(pad, 12) ? -1 : 0;
    const dDown = buttonPressed(pad, 13) ? 1 : 0;

    if (state.menuOpen) {
      const navY = Math.abs(ly) > .55 ? Math.sign(ly) : (dUp + dDown);
      const editX = Math.abs(lx) > .55 ? Math.sign(lx) : (dLeft + dRight);

      if (navY && now - state.lastNav > 170) {
        state.lastNav = now;
        menuMove(navY);
      }

      if (editX && now - state.lastEdit > 95) {
        state.lastEdit = now;
        menuEdit(editX);
      }

      if (edgeButton(pad, 0)) menuAction();
      if (edgeButton(pad, 1)) closeMenu();

      return { x: 0, y: 0, z: 0 };
    }

    if (edgeButton(pad, 0)) openMenu();
    if (edgeButton(pad, 1)) toggleGrid();
    if (edgeButton(pad, 2)) setSurvey(state.surveyIndex - 1);
    if (edgeButton(pad, 3)) setSurvey(state.surveyIndex + 1);
    if (edgeButton(pad, 4)) goTarget(state.targetIndex - 1);
    if (edgeButton(pad, 5)) goTarget(state.targetIndex + 1);
    if (edgeButton(pad, 8)) toggleHud();
    if (edgeButton(pad, 9)) fullscreen();

    const z = ry + buttonValue(pad, 6) - buttonValue(pad, 7);

    return {
      x: clamp(lx + dLeft + dRight, -1, 1),
      y: clamp(ly + dUp + dDown, -1, 1),
      z: clamp(z, -1.5, 1.5)
    };
  }

  function applyMovement(dt, now) {
    if (state.menuOpen) {
      updateHud();
      return;
    }

    const k = keyboardVector();
    const g = gamepadVector(now);

    const x = clamp(k.x + g.x, -1, 1);
    const y = clamp(k.y + g.y, -1, 1);
    const z = clamp(k.z + g.z, -1.5, 1.5);

    if (Math.abs(x) + Math.abs(y) + Math.abs(z) < 0.001) {
      updateHud();
      return;
    }

    const fovFactor = clamp(state.fov, 0.02, 120);
    const step = fovFactor * state.speed * dt;
    const cosDec = Math.max(0.18, Math.cos(state.dec * Math.PI / 180));

    state.ra = wrapRa(state.ra + x * step / cosDec);
    state.dec = clamp(state.dec - y * step, -89.9, 89.9);

    if (Math.abs(z) > 0.001) {
      state.fov = clamp(state.fov * Math.exp(z * dt * 1.4), 0.01, 180);
    }

    syncView(false);
  }

  function loop(t) {
    if (!loop.last) loop.last = t;
    const dt = Math.min(0.08, (t - loop.last) / 1000);
    loop.last = t;
    applyMovement(dt, t);
    requestAnimationFrame(loop);
  }

  window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (state.menuOpen) {
      if (key === 'escape' || key === 'b') closeMenu();
      else if (key === 'enter' || key === ' ') menuAction();
      else if (key === 'arrowup' || key === 'w') menuMove(-1);
      else if (key === 'arrowdown' || key === 's') menuMove(1);
      else if (key === 'arrowleft' || key === 'a') menuEdit(-1);
      else if (key === 'arrowright' || key === 'd') menuEdit(1);
      e.preventDefault();
      return;
    }

    state.keys.add(key);

    if (['arrowup','arrowdown','arrowleft','arrowright',' ','+','-','=','_','pageup','pagedown'].includes(key)) {
      e.preventDefault();
    }

    if (key === 'enter' || key === ' ') {
      openMenu();
      e.preventDefault();
    }

    if (key === 'h') toggleHud();
    if (key === 'g') toggleGrid();
    if (key === 'q') setSurvey(state.surveyIndex - 1);
    if (key === 'e') setSurvey(state.surveyIndex + 1);
  });

  window.addEventListener('keyup', (e) => state.keys.delete(e.key.toLowerCase()));

  window.addEventListener('gamepadconnected', e => {
    state.padName = e.gamepad.id || 'gamepad';
    updateHud();
  });

  window.addEventListener('gamepaddisconnected', () => {
    state.padName = '';
    updateHud();
  });

  loadState();
  setEyeGap(state.eyeGap);
  updateHud();
  initAladin();
})();
</script>
</body>
</html>
